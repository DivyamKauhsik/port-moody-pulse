<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Port Moody Pulse — The heartbeat of Port Moody</title>
  <meta name="description" content="Local news, events and good news from Port Moody, B.C. — in one warm weekly read. Subscribe free." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
    :root {
      --inlet-900:#0A3537;
      --inlet:#0E4F4E;
      --tide:#15706E;
      --brass:#C7903B;
      --brass-bright:#E0A23C;
      --brass-deep:#9C6E22;
      --cta-bg:#8A5D17;
      --cta-hover:#6E4A10;
      --paper:#FBF7EE;
      --paper-2:#F4EEDF;
      --card:#FFFFFF;
      --ink:#15302E;
      --ink-2:#3B524F;
      --mist:#54655F;
      --line:#E7E0D0;
      --field-border:#7C8E8A;
      --on-teal:#EAF3F1;
      --on-teal-soft:#DCEAE6;
      --fd:'Newsreader', Georgia, 'Times New Roman', serif;
      --fb:'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--fb);
      font-size: 17px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img,
    svg {
      max-width: 100%;
      display: block;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 28px;
    }

    .vh {
      position: absolute !important;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
      border: 0;
    }

    .skip {
      position: absolute;
      left: 10px;
      top: -60px;
      background: var(--inlet);
      color: #fff;
      padding: 11px 18px;
      border-radius: 0 0 10px 10px;
      z-index: 100;
      font-weight: 600;
      font-size: 15px;
      transition: top .15s ease;
    }

    .skip:focus {
      top: 0;
    }

    :focus-visible {
      outline: 2.5px solid var(--inlet-900);
      outline-offset: 2px;
      box-shadow: 0 0 0 5px rgba(224,162,60,.6);
      border-radius: 5px;
    }

    .util {
      background: var(--inlet-900);
      color: #B6D0CC;
      font-size: 12.5px;
    }

    .util .wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 40px;
      gap: 14px;
    }

    .util .date {
      letter-spacing: .02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .util .soc {
      display: flex;
      gap: 11px;
    }

    .util .soc a {
      display: inline-flex;
      width: 30px;
      height: 30px;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 50%;
      color: #CBE0DC;
      font-size: 12px;
      font-weight: 700;
    }

    .util .soc a:hover {
      color: #fff;
      border-color: var(--brass-bright);
    }

    .mast {
      background: var(--paper);
      position: sticky;
      top: 0;
      z-index: 40;
      border-bottom: 1px solid var(--line);
    }

    .mast .wrap {
      display: flex;
      align-items: center;
      gap: 20px;
      min-height: 78px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
      flex: none;
    }

      width: 42px;
      height: 42px;
